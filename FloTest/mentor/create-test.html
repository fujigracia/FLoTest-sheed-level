<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Buat Tes Baru</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="dashboard-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>👨‍🏫 Ruang Mentor</h2>
        </div>
        <nav class="sidebar-menu">
            <ul>
                <li><a href="dashboard.html">🏠 Dashboard</a></li>
                <li><a href="tests.html">📂 Daftar Tes</a></li>
                <li><a href="create-test.html" class="active">➕ Buat Tes Baru</a></li>
                <li class="menu-separator"></li>
                <li><a href="../index.html" class="logout-link">🚪 Keluar</a></li>
            </ul>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="main-header"></header>

        <main class="content-body">
            <h2>📝 Form Pembuatan Ujian Baru</h2>
            <a href="dashboard.html" class="back-dashboard-btn">&larr; Kembali ke Dashboard</a>

            <div class="form-container-box">
                <form action="tests.html" method="GET">
                    <div class="form-group">
                        <label for="test-title">Judul Utama Tes</label>
                        <input type="text" id="test-title" name="test_title" required placeholder="Contoh: JavaScript DOM Manipulation Test">
                    </div>

                    <div class="form-group">
                        <label for="test-desc">Deskripsi & Instruksi Pengerjaan</label>
                        <textarea id="test-desc" name="test_desc" placeholder="Tuliskan petunjuk pengerjaan ujian untuk menti disini..."></textarea>
                    </div>

                    <div class="form-group form-group-select">
                        <label for="test-status">Tentukan Status Publikasi</label>
                        <select id="test-status" name="test_status" required>
                            <option value="draft">🟡 Draft (Simpan Saja)</option>
                            <option value="published">🟢 Published (Rilis ke Menti)</option>
                            <option value="archived">🔴 Archived (Arsip)</option>
                        </select>
                    </div>

                    <div class="form-button-group">
                        <button type="submit" class="btn">💾 Simpan Paket Ujian</button>
                        <a href="dashboard.html" class="btn btn-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 FloTest - FUJI </p>
        </footer>
    </div>
</body>
</html>
