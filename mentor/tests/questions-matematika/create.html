<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Tambah Soal Matematika</title>
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body class="dashboard-layout">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>⚡ Panel Mentor</h2>
        </div>
        <nav class="sidebar-menu">
            <ul>
                <li><a href="../../dashboard.html">🏠 Dashboard Mentor</a></li>
                <li><a href="../index.html" class="active">📂 Menu Tests</a></li>
                <li><a href="../../../index.html" class="logout-link">🚪 Keluar</a></li>
            </ul>
        </nav>
    </aside>

    <div class="main-wrapper">
        <main class="content-body">
            <section class="welcome-banner">
                <h2>➕ Tambah Soal Matematika Baru</h2>
                <p>Masukkan soal matematika beserta pilihan ganda dan tentukan jawaban benarnya.</p>
                <a href="index.html" class="back-dashboard-btn">&larr; Kembali ke Daftar Soal</a>
            </section>

            <section class="form-container-box">
                <form onsubmit="alert('Soal matematika berhasil ditambahkan!'); window.location.href='index.html'; return false;">
                    <div class="form-group">
                        <label>Teks Pertanyaan</label>
                        <input type="text" placeholder="Masukkan soal matematika..." required>
                    </div>

                    <div class="form-group">
                        <label>Pilihan A</label>
                        <input type="text" placeholder="Jawaban A" required>
                    </div>
                    <div class="form-group">
                        <label>Pilihan B</label>
                        <input type="text" placeholder="Jawaban B" required>
                    </div>
                    <div class="form-group">
                        <label>Pilihan C</label>
                        <input type="text" placeholder="Jawaban C" required>
                    </div>
                    <div class="form-group">
                        <label>Pilihan D</label>
                        <input type="text" placeholder="Jawaban D" required>
                    </div>

                    <div class="form-group">
                        <label>Kunci Jawaban</label>
                        <select required>
                            <option value="" disabled selected>-- Pilih Kunci yang Benar --</option>
                            <option value="A">Opsi A</option>
                            <option value="B">Opsi B</option>
                            <option value="C">Opsi C</option>
                            <option value="D">Opsi D</option>
                        </select>
                    </div>

                    <div class="form-button-group">
                        <button type="submit" class="btn" style="width: 100%; padding: 12px;">🚀 Simpan Soal</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
