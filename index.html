<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Masuk ke Platform</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page login-page-layout">

    <div class="login-container">
        <main class="login-card">
            
            <div class="login-header">
                <div class="brand-logo-center">
                    <div class="logo-icon-box">⚡</div>
                    <span class="logo-text-gradient">FloTest</span>
                </div>
                <p>Silakan lengkapi data di bawah untuk masuk ke sistem</p>
            </div>

            <form action="#" class="form-login">
                
                <div class="form-group form-group-email">
                    <label for="email">Alamat Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="input-login" 
                        placeholder="" 
                        required
                    >
                </div>

                <div class="form-group form-group-password">
                    <label for="password">Kata Sandi</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="input-login" 
                        placeholder="" 
                        required
                    >
                </div>

                <div class="form-group">
                    <details class="login-dropdown">
                        <summary class="btn btn-login-submit">
                            Login <span class="arrow-btn">▼</span>
                        </summary>
                        
                        <div class="dropdown-roles-container">
                            <p class="hint-text">Pilih peran Anda untuk masuk:</p>
                            <a href="admin/dashboard.html" class="role-link link-admin">🔑 Masuk Sebagai Admin</a>
                            <a href="mentor/dashboard.html" class="role-link link-mentor">👨‍🏫 Masuk Sebagai Mentor</a>
                            <a href="menti/dashboard.html" class="role-link link-menti">🎓 Masuk Sebagai Menti</a>
                        </div>
                    </details>
                </div>

            </form>

            <footer class="login-footer">
                <p>&copy; 2026 FloTest - FUJI</p>
            </footer>

        </main>
    </div>

</body>
</html>
