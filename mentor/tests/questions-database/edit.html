<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Edit Soal Basis Data</title>
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body class="dashboard-layout">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>⚡ Panel Mentor</h2>
        </div>
        <nav class="sidebar-menu">
            <ul>
                <li><a href="../../dashboard.html">🏠 Dashboard Mentor</a></li>
                <li><a href="../index.html" class="active">📂 Menu Tests</a></li>
                <li><a href="../../../index.html" class="logout-link">🚪 Keluar</a></li>
            </ul>
        </nav>
    </aside>

    <div class="main-wrapper">
        <main class="content-body">
            <section class="welcome-banner">
                <h2>✏️ Edit Butir Soal</h2>
                <p>Ubah teks pertanyaan atau kunci jawaban untuk materi Basis Data.</p>
                <a href="index.html" class="back-dashboard-btn">&larr; Kembali ke Daftar Soal</a>
            </section>

            <section class="form-container-box">
            <form onsubmit="alert('Data soal 1 tersimpan!'); window.location.href='index.html'; return false;">
            <div class="form-group">
                <label>Teks Pertanyaan</label>
                <input type="text" value="Perintah SQL manakah yang digunakan untuk mengambil data dari tabel?" required>
            </div>
            <div class="form-group">
                <label>Pilihan Opsi A</label>
                <input type="text" value="SELECT">
            </div>
            <div class="form-group">
                <label>Pilihan Opsi B</label>
                <input type="text" value="INSERT">
            </div>
            <div class="form-group">
                <label>Pilihan Opsi C</label>
                <input type="text" value="UPDATE">
            </div>
            <div class="form-group">
                <label>Pilihan Opsi D</label>
                <input type="text" value="DELETE">
            </div>
            <div class="form-group">
                <label>Pilih Kunci Jawaban Benar</label>
                <select>
                    <option value="A" selected>Opsi A</option>
                    <option value="B">Opsi B</option>
                    <option value="C">Opsi C</option>
                    <option value="D">Opsi D</option>
                </select>
            </div>
            <button type="submit" class="btn">💾 Simpan Perubahan</button>
        </form>
</section>
        </main>
    </div>
</body>
</html>
