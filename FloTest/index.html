<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Masuk ke Platform</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page login-page-layout">

    <div class="login-container">
        <main class="login-card">
            
            <div class="login-header">
                <div class="brand-logo-center">
                    <div class="logo-icon-box">⚡</div>
                    <span class="logo-text-gradient">FloTest</span>
                </div>
                <p>Silakan lengkapi data di bawah untuk masuk ke sistem</p>
            </div>

            <form action="menti/dashboard.html" method="POST" class="form-login">
                
                <div class="form-group form-group-email">
                    <label for="email">Alamat Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="input-login" 
                        placeholder="" 
                        required 
                        autocomplete="username"
                    >
                </div>

                <div class="form-group form-group-password">
                    <label for="password">Kata Sandi</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="input-login" 
                        placeholder="" 
                        minlength="8" 
                        required 
                        autocomplete="current-password"
                    >
                </div>

                <div class="form-group form-group-select">
                    <label for="login-role">Masuk Sebagai</label>
                    <select id="login-role" name="role" required>
                        <option value="" disabled selected>-- Pilih Peran Anda --</option>
                        <option value="admin">🔑 Admin</option>
                        <option value="mentor">👨‍🏫 Mentor / Pengajar</option>
                        <option value="menti">🎓 Menti / Peserta Ujian</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-login-submit">Login</button>
            </form>

            <footer class="login-footer">
                <p>&copy; 2026 FloTest - FUJI</p>
            </footer>

        </main>
    </div>

</body>
</html>
