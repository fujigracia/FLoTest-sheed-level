<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Mengerjakan Ujian</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="dashboard-layout">

    <aside class="sidebar">
        <div class="sidebar-brand"><h2>⚡ Panel Menti</h2></div>
        <nav class="sidebar-menu">
            <ul>
                <li><a href="dashboard.html">🏠 Dashboard Menti</a></li>
                <li><a href="dashboard.html" class="active">📝 Menu Take Test</a></li>
            </ul>
        </nav>
    </aside>

    <div class="main-wrapper">
        <main class="content-body">
            <section class="welcome-banner" style="border-left: 5px solid #3b82f6;">
                <h2 id="judul-ujian">Memuat Ujian...</h2>
                <p>Harap baca soal dengan teliti.</p>
                <a href="dashboard.html" class="back-dashboard-btn">&larr; Keluar</a>
            </section>

            <div class="quiz-container">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span id="nomor-soal" style="font-size: 0.95rem; color: #64748b;">Memuat...</span>
                    <span id="progres-teks" style="font-size: 0.95rem; font-weight: 600; color: #3b82f6;">0%</span>
                </div>
                <div class="progress-bar-wrapper">
                    <div id="progress-bar" class="progress-bar-fill" style="width: 0%;"></div>
                </div>

                <div id="question-text" class="question-text" style="margin-bottom: 20px;"></div>

                <form id="quiz-form">
                    <div id="options-list" class="options-list">
                        </div>

                    <div class="quiz-navigation-buttons" style="margin-top: 20px; display: flex; justify-content: space-between;">
                        <button type="button" id="btn-prev" class="btn btn-secondary">← Sebelumnya</button>
                        <div style="display: flex; gap: 8px;">
                            <button type="button" id="btn-next" class="btn" style="background-color: #4f46e5;">Selanjutnya →</button>
                            <button type="submit" id="btn-submit" class="btn" style="background-color: #16a34a; display:none;">🔒 Kirim Ujian</button>
                        </div>
                    </div>
                </form>
            </div>
            </main>
    </div>

    <script src="../assets/js/main.js"></script>
</body>
</html>
