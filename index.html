<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Masuk ke Platform</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page-layout login-page">

    <div class="login-container">
        <main class="login-card">
            
            <div class="login-header">
                <div class="brand-logo-center">
                    <div class="logo-icon-box">⚡</div>
                    <span class="logo-text-gradient">FloTest</span>
                </div>
                <p>Silakan lengkapi data di bawah untuk masuk ke sistem</p>
            </div>

            <form action="#" class="form-login">
                
                <div class="form-group form-group-email">
                    <label for="email">Alamat Email</label>
                    <input type="email" id="email" class="input-login" placeholder="Email Anda" required>
                </div>

                <div class="form-group form-group-password">
                    <label for="password">Kata Sandi</label>
                    <input type="password" id="password" class="input-login" placeholder="Password Anda" required>
                </div>
                        
                <div class="form-group role-buttons">
                    <p class="hint-text">LOGIN SEBAGAI: </p>
                    <div class="role-list">
                        <a href="admin/dashboard.html" class="role-link">Admin</a>
                        <a href="mentor/dashboard.html" class="role-link">Mentor</a>
                        <a href="menti/dashboard.html" class="role-link">Menti</a>
                    </div>
                </div>
            </form>

            <footer class="login-footer">
                <p>&copy; 2026 FloTest - FUJI</p>
            </footer>

        </main>
    </div>

</body>
</html>
