<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Edit Soal</title>
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body class="dashboard-layout">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>⚡ Panel Admin</h2>
        </div>
        <nav class="sidebar-menu">
            <ul>
                <li><a href="../../dashboard.html">🏠 Dashboard Admin</a></li>
                <li><a href="../../user/index.html">👥 Menu Users</a></li>
                <li><a href="../index.html" class="active">📂 Menu Tests</a></li>
                <li class="menu-separator"></li>
                <li><a href="../../../index.html" class="logout-link">🚪 Keluar</a></li>
            </ul>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="main-header">
            <div class="user-profile">
                <span>Otoritas: <strong>Master Admin</strong> 👑</span>
            </div>
        </header>

        <main class="content-body">
            <section class="welcome-banner border-warning">
            <h2>✏️ Modifikasi Butir Pertanyaan</h2>
            <p>Ubah muatan materi redaksi soal kuis atau perbarui penetapan opsi pilihan kunci jawaban yang benar.</p>
            <a href="index.html" class="back-dashboard-btn">&larr; Kembali ke Daftar Soal</a>
        </section>

        <section class="form-container-box">
            <form action="#" onsubmit="event.preventDefault(); alert('Pertanyaan kuis berhasil diperbarui!'); window.location.href='index.html';">
                <div class="form-group">
                    <label for="question">Teks Pertanyaan (Question Text)</label>
                    <input type="text" id="question" value="Tag HTML manakah yang digunakan secara khusus untuk membuat hyperlink?" required>
                </div>

            <div class="form-group">
                <label for="optionA">Pilihan A</label>
                <input type="text" id="optionA" value="<p>" required>
            </div>

            <div class="form-group">
                <label for="optionB">Pilihan B</label>
                <input type="text" id="optionB" value="<a>" required>
            </div>

            <div class="form-group">
                <label for="optionC">Pilihan C</label>
                <input type="text" id="optionC" value="<link>" required>
            </div>

            <div class="form-group">
                <label for="optionD">Pilihan D</label>
                <input type="text" id="optionD" value="<href>" required>
            </div>

<div class="form-group">
    <label for="answer">Jawaban Kunci Benar</label>
    <select id="answer" required>
        <option value="A">Opsi A</option>
        <option value="B" selected>Opsi B</option>
        <option value="C">Opsi C</option>
        <option value="D">Opsi D</option>
    </select>
</div>

                <button type="submit" class="btn-update">💾 Perbarui Pertanyaan</button>
            </form>
        </section>
        </main>

        <footer>
            <p>&copy; 2026 FloTest - FUJI </p>
        </footer>
    </div>
</body>
</html>
