<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Tambah Paket Tes</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="dashboard-layout">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>⚡ Panel Admin</h2>
        </div>
        <nav class="sidebar-menu">
            <ul>
                <li><a href="../dashboard.html">🏠 Dashboard Admin</a></li>
                <li><a href="../user/index.html">👥 Menu Users</a></li>
                <li><a href="index.html" class="active">📂 Menu Tests</a></li>
                <li class="menu-separator"></li>
                <li><a href="../../index.html" class="logout-link">🚪 Keluar</a></li>
            </ul>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="main-header">
            <div class="user-profile">
                <span>Otoritas: <strong>Master Admin</strong> 👑</span>
            </div>
        </header>

        <main class="content-body">
            <section class="welcome-banner">
                <h2>➕ Buat Paket Ujian Baru</h2>
                <p>Buat wadah ujian baru, tentukan deskripsi instruksi pengerjaan, penanggung jawab, serta status rilisnya.</p>
                <a href="index.html" class="back-dashboard-btn" style="margin-bottom: 0;">&larr; Kembali ke Daftar Tests</a>
            </section>

            <section class="form-container-box">
                <form action="#" onsubmit="event.preventDefault(); alert('Paket tes baru berhasil dibuat!'); window.location.href='index.html';">
                    <div class="form-group">
                        <label>Judul Ujian (Title)</label>
                        <input type="text" placeholder="Contoh: Javascript Tingkat Dasar" required>
                    </div>

                    <div class="form-group">
                        <label>Deskripsi & Petunjuk Ujian (Description)</label>
                        <textarea placeholder="Tulis instruksi pengerjaan ujian di sini..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Pilih Penanggung Jawab (Mentor)</label>
                        <select required>
                            <option value="" disabled selected>-- Pilih Mentor --</option>
                            <option value="Ahmad Mentor">Ahmad Mentor</option>
                            <option value="Siti Mentor">Siti Mentor</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Status Publikasi</label>
                        <select required>
                            <option value="Draft">Draft</option>
                            <option value="Published">Published</option>
                            <option value="Archived">Archived</option>
                        </select>
                    </div>

                    <div class="form-button-group">
                        <button type="submit" class="btn" style="width: 100%;">🚀 Simpan Paket Tes</button>
                    </div>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 FloTest - FUJI </p>
        </footer>
    </div>
</body>
</html>
