<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Tambah Soal Baru</title>
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body class="dashboard-layout">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>⚡ Panel Admin</h2>
        </div>
        <nav class="sidebar-menu">
            <ul>
                <li><a href="../../dashboard.html">🏠 Dashboard Admin</a></li>
                <li><a href="../../user/index.html">👥 Menu Users</a></li>
                <li><a href="../index.html" class="active">📂 Menu Tests</a></li>
                <li class="menu-separator"></li>
                <li><a href="../../../index.html" class="logout-link">🚪 Keluar</a></li>
            </ul>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="main-header">
            <div class="user-profile">
                <span>Otoritas: <strong>Master Admin</strong> 👑</span>
            </div>
        </header>

        <main class="content-body">
            <section class="welcome-banner">
                <h2>➕ Tambah Butir Pertanyaan Baru</h2>
                <p>Tulis teks deskripsi pertanyaan kuis serta rancang pilihan ganda beserta kunci nilai kelulusannya.</p>
                <a href="index.html" class="back-dashboard-btn" style="margin-bottom: 0;">&larr; Kembali ke Daftar Soal</a>
            </section>

            <section class="form-container-box">
            <form action="#" onsubmit="event.preventDefault(); alert('Pertanyaan baru berhasil disimpan!'); window.location.href='index.html';">
                <div class="form-group">
                    <label for="question">Teks Pertanyaan (Question Text)</label>
                    <input type="text" id="question" placeholder="Masukkan kalimat pertanyaan kuis..." required>
                </div>

                <div class="form-group">
                    <label for="opsiA">Pilihan Opsi A</label>
                    <input type="text" id="opsiA" placeholder="Tulis jawaban opsi A..." required>
                </div>
                <div class="form-group">
                    <label for="opsiB">Pilihan Opsi B</label>
                    <input type="text" id="opsiB" placeholder="Tulis jawaban opsi B..." required>
                </div>
                <div class="form-group">
                    <label for="opsiC">Pilihan Opsi C</label>
                    <input type="text" id="opsiC" placeholder="Tulis jawaban opsi C..." required>
                </div>
                <div class="form-group">
                    <label for="opsiD">Pilihan Opsi D</label>
                    <input type="text" id="opsiD" placeholder="Tulis jawaban opsi D..." required>
                </div>

                <div class="form-group">
                    <label for="correctAnswer">Jawaban Kunci Benar</label>
                    <select id="correctAnswer" required>
                        <option value="" disabled selected>-- Tentukan Opsi yang Benar --</option>
                        <option value="A">Opsi A</option>
                        <option value="B">Opsi B</option>
                        <option value="C">Opsi C</option>
                        <option value="D">Opsi D</option>
                    </select>
                </div>

                <div class="form-button-group">
                    <button type="submit" class="btn-submit">🚀 Simpan Butir Pertanyaan</button>
                </div>
            </form>
        </section>
        </main>

        <footer>
            <p>&copy; 2026 FloTest - FUJI </p>
        </footer>
    </div>
</body>
</html>
