<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Edit Paket Tes</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="dashboard-layout">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>⚡ Panel Admin</h2>
        </div>
        <nav class="sidebar-menu">
            <nav class="sidebar-menu">
    <ul>
        <li><a href="../dashboard.html">🏠 Dashboard Admin</a></li>
        <li><a href="../user/index.html">👥 Menu Users</a></li>
        <li><a href="index.html">📂 Menu Tests</a></li>
        <li class="menu-separator"></li>
        <li><a href="../../index.html" class="logout-link">🚪 Keluar</a></li>
    </ul>
</nav>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="main-header">
            <div class="user-profile">
                <span>Otoritas: <strong>Master Admin</strong> 👑</span>
            </div>
        </header>

        <main class="content-body">
            <section class="welcome-banner" style="border-left: 5px solid var(--warning);">
                <h2>✏️ Modifikasi Informasi Paket Ujian</h2>
                <p>Sesuaikan ulang judul, deskripsi petunjuk, maupun status distribusi paket tes ini.</p>
                <a href="index.html" class="back-dashboard-btn" style="margin-bottom: 0;">&larr; Kembali ke Daftar Tests</a>
            </section>

            <section class="form-container-box">
                <form action="#" onsubmit="event.preventDefault(); alert('Paket tes berhasil diperbarui!'); window.location.href='index.html';">
                    <div class="form-group">
                        <label>Judul Ujian (Title)</label>
                        <input type="text" value="HTML Basic Ujian Utama" placeholder="Masukkan judul..." required>
                    </div>

                    <div class="form-group">
                        <label>Deskripsi & Petunjuk Ujian (Description)</label>
                        <textarea placeholder="Tulis instruksi..." required>Ujian ini mencakup pemahaman tag dasar HTML beserta pengenalan elemen semantik untuk membuat pondasi website standar industri.</textarea>
                    </div>

                    <div class="form-group">
                        <label>Pilih Penanggung Jawab (Mentor)</label>
                        <select required>
                            <option value="Ahmad Mentor" selected>Ahmad Mentor</option>
                            <option value="Siti Mentor">Siti Mentor</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Status Publikasi</label>
                        <select required>
                            <option value="Draft">Draft</option>
                            <option value="Published" selected>Published</option>
                            <option value="Archived">Archived</option>
                        </select>
                    </div>

                    <div class="form-button-group">
                        <button type="submit" class="btn" style="width: 100%; background-color: var(--warning);">💾 Perbarui Paket Tes</button>
                    </div>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 FloTest - FUJI </p>
        </footer>
    </div>
</body>
</html>
